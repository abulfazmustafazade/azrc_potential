<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yüksək Potensial Qiymətləndirmə</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div style="position:fixed;top:0;right:0;padding:1rem;display:flex;gap:6px;z-index:20">
    <button class="tog theme-btn" onclick="toggleTheme()"></button>
    <button class="tog lang-btn" data-lang="az" onclick="setLang('az')">AZ</button>
    <button class="tog lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
  <div class="center-page">
    <div class="login-card">
      <div class="ib ib-d mb-6">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <h1 style="font-size:1.5rem;font-weight:500" class="mb-1" data-t="login.title"></h1>
      <p class="ts tc2 mb-8" data-t="login.sub"></p>
      <div id="err" class="alert alert-warn hidden mb-4">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errT"></span>
      </div>
      <label class="field"><span class="fl" data-t="login.email"></span><input type="email" id="email" data-tp="login.email.ph" autocomplete="email"></label>
      <label class="field"><span class="fl" data-t="login.code"></span><input type="text" id="idCode" data-tp="login.code.ph" autocomplete="off" maxlength="20"></label>
      <button class="btn btn-p btn-block mt-2" id="loginBtn" onclick="login()"><span data-t="login.btn"></span></button>
      <p class="tx tc3 tc mt-6" data-t="login.hint"></p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>
    initPage();
    if(getSession())location.href='dashboard.html';
    async function login(){
      const email=document.getElementById('email').value.trim();
      const idCode=document.getElementById('idCode').value.trim();
      const el=document.getElementById('err'),et=document.getElementById('errT'),btn=document.getElementById('loginBtn');
      if(!email||!idCode){el.classList.remove('hidden');et.textContent=t('login.err.empty');return;}
      btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
      try{
        const r=await doLogin(email,idCode);
        if(r.ok){setSession({email:r.email,name:r.name});location.href='dashboard.html';}
        else{el.classList.remove('hidden');et.textContent=r.err==='notmgr'?t('login.err.notmgr'):t('login.err.invalid');}
      }catch(e){el.classList.remove('hidden');et.textContent=t('login.err.server');}
      btn.disabled=false;btn.innerHTML=`<span data-t="login.btn">${t('login.btn')}</span>`;
    }
    document.getElementById('idCode').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  </script>
</body>
</html>
